<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>WebEmu</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    color: #eee;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  #picker {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
    box-sizing: border-box;
    text-align: center;
  }

  #picker h1 {
    font-size: 1.4rem;
    margin: 0 0 4px 0;
  }

  #picker p {
    font-size: 0.9rem;
    color: #999;
    margin: 0 0 12px 0;
    max-width: 320px;
  }

  #romInput {
    display: none;
  }

  .pick-btn {
    font-size: 1.1rem;
    padding: 14px 28px;
    border-radius: 12px;
    border: none;
    background: #3b82f6;
    color: #fff;
    cursor: pointer;
  }

  .pick-btn:active {
    background: #2563eb;
  }

  #fileName {
    font-size: 0.85rem;
    color: #6ee7b7;
    min-height: 1.2em;
  }

  #error {
    font-size: 0.85rem;
    color: #f87171;
    min-height: 1.2em;
    max-width: 320px;
  }

  #game {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  
  #backBtn {
    position: fixed;
    top: 8px;
    left: 8px;
    z-index: 10000;
    font-size: 0.8rem;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #444;
    background: rgba(0,0,0,0.6);
    color: #ccc;
    display: none;
  }
</style>
</head>
<body>

<div id="picker">
  <h1>WebEmu</h1>
  <p>Pick a GBA ROM from this device. Nothing is uploaded anywhere — it loads straight into the emulator, locally.</p>
  <button class="pick-btn" id="pickBtn">Choose ROM File</button>
  <input type="file" id="romInput" accept=".gba,.zip">
  <div id="fileName"></div>
  <div id="error"></div>
</div>

<button id="backBtn">&larr; Choose different ROM</button>
<div id="game"></div>

<script>
  var pickBtn = document.getElementById('pickBtn');
  var romInput = document.getElementById('romInput');
  var fileNameEl = document.getElementById('fileName');
  var errorEl = document.getElementById('error');
  var pickerEl = document.getElementById('picker');
  var backBtn = document.getElementById('backBtn');

  pickBtn.addEventListener('click', function () {
    romInput.click();
  });

  //romInput.addEventListener('change', function () {
  //  var file = romInput.files && romInput.files[0];
  //  if (!file) return;
  //  errorEl.textContent = '';
  //  fileNameEl.textContent = file.name;
  //  startEmulator(file.name, URL.createObjectURL(file));
  //});

  window.addEventListener("load", function () {
    startEmulator(
        "Pokemon FireRed",
        "./Pokemon FireRed.gba"
    );
  });

  backBtn.addEventListener('click', function () {
    location.reload();
  });

  // ---------------------------------------------------------------------
  // Fail-safe autosave (separate IndexedDB store, two-tier: current/previous)
  // This is entirely independent of EmulatorJS's own save-state DB, so the
  // manual Save State / Load State / Quick Save / Quick Load buttons above
  // are untouched and unaffected by any of this.
  // ---------------------------------------------------------------------
  var AUTOSAVE_DB_NAME = 'webemu-autosave';
  var AUTOSAVE_STORE = 'states';
  var AUTOSAVE_INTERVAL_MS = 5 * 60 * 1000; // 5 minutes
  var AUTOSAVE_MIN_BYTES = 1024; // reject anything implausibly small/truncated
  var autosaveTimer = null;

  function openAutosaveDB() {
    return new Promise(function (resolve, reject) {
      var req = indexedDB.open(AUTOSAVE_DB_NAME, 1);
      req.onupgradeneeded = function () {
        req.result.createObjectStore(AUTOSAVE_STORE);
      };
      req.onsuccess = function () { resolve(req.result); };
      req.onerror = function () { reject(req.error); };
    });
  }

  function idbGet(db, key) {
    return new Promise(function (resolve, reject) {
      var tx = db.transaction(AUTOSAVE_STORE, 'readonly');
      var req = tx.objectStore(AUTOSAVE_STORE).get(key);
      req.onsuccess = function () { resolve(req.result || null); };
      req.onerror = function () { reject(req.error); };
    });
  }

  // Writes all entries in a single transaction, so the "demote old current
  // to previous" + "write new current" swap is all-or-nothing.
  function idbPutMany(db, entries) {
    return new Promise(function (resolve, reject) {
      var tx = db.transaction(AUTOSAVE_STORE, 'readwrite');
      entries.forEach(function (entry) {
        tx.objectStore(AUTOSAVE_STORE).put(entry[1], entry[0]);
      });
      tx.oncomplete = function () { resolve(); };
      tx.onerror = function () { reject(tx.error); };
    });
  }

  async function sha256Hex(bytes) {
    var digest = await crypto.subtle.digest('SHA-256', bytes);
    return Array.from(new Uint8Array(digest)).map(function (b) {
      return b.toString(16).padStart(2, '0');
    }).join('');
  }

  // Confirms an entry is structurally sound before it's ever promoted or
  // restored: right shape, plausible size, and (if present) hash-checked
  // against bit-rot in storage, not just a bad capture at save time.
  async function verifyEntry(entry) {
    if (!entry || !entry.bytes || !entry.bytes.length) return false;
    if (entry.bytes.length < AUTOSAVE_MIN_BYTES) return false;
    if (entry.hash) {
      var check = await sha256Hex(entry.bytes);
      if (check !== entry.hash) return false;
    }
    return true;
  }

  async function captureAutosave(gameName) {
    var e = window.EJS_emulator;
    if (!e || !e.gameManager || typeof e.gameManager.getState !== 'function') return;

    var stateBytes;
    try {
      stateBytes = e.gameManager.getState();
    } catch (err) {
      console.warn('[autosave] getState() threw, skipping this cycle:', err);
      return;
    }

    if (!stateBytes || !stateBytes.length || stateBytes.length < AUTOSAVE_MIN_BYTES) {
      console.warn('[autosave] captured state looked invalid, skipping this cycle');
      return;
    }

    // Copy out of the emulator's heap-backed buffer before it can be reused.
    var snapshot = new Uint8Array(stateBytes);
    var hash = await sha256Hex(snapshot);
    var key = 'autosave:' + gameName;
    var prevKey = key + ':previous';

    try {
      var db = await openAutosaveDB();
      var currentEntry = await idbGet(db, key);

      var writes = [];
      if (currentEntry) {
        writes.push([prevKey, currentEntry]); // demote last good save
      }
      writes.push([key, { bytes: snapshot, hash: hash, savedAt: Date.now() }]);

      await idbPutMany(db, writes);
      db.close();
      console.log('[autosave] saved (' + snapshot.length + ' bytes)');
    } catch (err) {
      console.warn('[autosave] failed to write to IndexedDB:', err);
    }
  }

  async function restoreAutosave(gameName) {
    var e = window.EJS_emulator;
    if (!e || !e.gameManager || typeof e.gameManager.loadState !== 'function') return;

    var db;
    try {
      db = await openAutosaveDB();
    } catch (err) {
      console.warn('[autosave] could not open DB for restore:', err);
      return;
    }

    var key = 'autosave:' + gameName;
    var prevKey = key + ':previous';

    var entry = await idbGet(db, key).catch(function () { return null; });
    var usedTier = 'current';

    if (!(await verifyEntry(entry))) {
      console.warn('[autosave] current tier missing/corrupt, falling back to previous tier');
      entry = await idbGet(db, prevKey).catch(function () { return null; });
      usedTier = 'previous';
    }

    db.close();

    if (!(await verifyEntry(entry))) {
      console.log('[autosave] no valid autosave found, starting fresh');
      return;
    }

    try {
      e.gameManager.loadState(entry.bytes);
      console.log('[autosave] restored from ' + usedTier + ' tier (' + entry.bytes.length + ' bytes)');
    } catch (err) {
      console.warn('[autosave] loadState() threw during restore:', err);
    }
  }

  function startAutosaveLoop(gameName) {
    if (autosaveTimer) clearInterval(autosaveTimer);
    autosaveTimer = setInterval(function () {
      captureAutosave(gameName);
    }, AUTOSAVE_INTERVAL_MS);

    // A fixed interval alone can miss the last stretch of play if the tab is
    // just closed outright, so also catch it going into the background.
    // (Not relying on beforeunload/unload -- those fire unreliably for async
    // work, especially on embedded browsers like the Portal's.)
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'hidden') {
        captureAutosave(gameName);
      }
    });

    // Ask the browser not to evict this data under storage pressure.
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist();
    }
  }

  function startEmulator(fileName, blobUrl) {
    // EmulatorJS config -- must be set before loader.js runs.
    window.EJS_player = '#game';
    window.EJS_core = 'gba';
    window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_gameName = fileName.replace(/\.[^/.]+$/, '');
    window.EJS_gameUrl = blobUrl;
    window.EJS_startOnLoaded = true;

    // Flush SRAM every 30 seconds
    window.EJS_fixedSaveInterval = 30000;
    
    // Called when EmulatorJS finishes mounting its save database
    window.EJS_onSaveDatabaseLoaded = function () {
        console.log("✅ Save database mounted");
    };
    
    // Called whenever EmulatorJS writes save files
    window.EJS_onSaveSaveFiles = function () {
        console.log("💾 Save files updated");
    };

    // The CDN build's auto-detect (navigator.maxTouchPoints / any-pointer:coarse)
    // only shows the virtual gamepad on real touch hardware, so it won't appear
    // during desktop testing. Force it on directly once the core starts, using
    // the same activation this build applies internally on touch devices.
    //--window.EJS_onGameStart = function () {
    //  var e = window.EJS_emulator;
    //  if (!e || !e.virtualGamepad) return;
    //  e.virtualGamepad.classList.add('ejs-vgamepad-active');
    //  e.canvas.classList.add('ejs-canvas-no-pointer');
      // Something in this build's settings-sync re-hides the pad shortly after
      // start (its default "virtual-gamepad" preference is "disabled" whenever
      // isMobile/hasTouchScreen read false, as they do on a mouse/keyboard
    //  // laptop). Pin the toggle so nothing can turn it back off.
    //  var nativeToggle = e.toggleVirtualGamepad.bind(e);
    //  e.toggleVirtualGamepad = function () { nativeToggle(true); };
    //  e.toggleVirtualGamepad(true);
    //};
    window.EJS_onGameStart = function () {
      console.log("🎮 Game started");
      
      const e = window.EJS_emulator;
      if (e && e.virtualGamepad) {
        e.touch = true;
        e.isMobile = true;
        e.hasTouchScreen = true;

        e.virtualGamepad.style.display = "";
        e.toggleVirtualGamepad(true);
      }

      // Restore the last good autosave (if any), then start the 5-minute
      // autosave loop. This runs after the virtual gamepad setup above but
      // doesn't depend on it.
      restoreAutosave(window.EJS_gameName).then(function () {
        startAutosaveLoop(window.EJS_gameName);
      });
    };


    // Virtual gamepad overlay shows automatically on touch-detected devices.
    window.EJS_Buttons = {
      playPause: false,
      restart: true,
      mute: true,
      settings: true,
      fullscreen: true,
  
      saveState: true,
      loadState: true,
  
      quickSave: true,
      quickLoad: true,
  
      gamepad: true,
  
      cheat: false,
      screenRecord: false,
      screenshot: false,
      cacheManager: false,
      volume: false,
      saveSavFiles: true,
      loadSavFiles: true,
      exitEmulation: false
    };

    pickerEl.style.display = 'none';
    backBtn.style.display = 'block';

    var script = document.createElement('script');
    script.src = window.EJS_pathtodata + 'loader.js';
    script.onerror = function () {
      errorEl.textContent = 'Failed to load the emulator core. Check your internet connection.';
      backBtn.style.display = 'none';
      pickerEl.style.display = 'flex';
    };
    document.body.appendChild(script);
  }
</script>

</body>
</html>
